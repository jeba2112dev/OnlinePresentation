<!DOCTYPE html>
<html>
<head>
<title>Pro Presenter Ultimate+</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* MAIN */
#app {
    display: flex;
    flex-wrap: wrap;
    width: 100%;
    min-height: 100vh;
}

/* PANELS COMMON */
.panel {
    padding: 10px;
}

/* LEFT */
#leftPanel {
    flex: 1 1 300px;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.05);
}

#inputArea {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    resize: none;
}

/* CENTER */
#centerPanel {
    flex: 2 1 500px;
    display: flex;
    flex-direction: column;
}

/* PREVIEW */
#previewPanel {
    flex: 0 0 35%;
    background: black;
    position: relative;
    min-height: 180px;
}

/* SLIDES GRID */
#bottomPanel {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
    gap: 10px;
    padding: 10px;
    overflow-y: auto;
}

/* RIGHT */
#historyPanel {
    flex: 1 1 250px;
    background: rgba(0,0,0,0.4);
    color: white;
    overflow-y: auto;
}

/* HISTORY */
.historyItem {
    background: rgba(255,255,255,0.08);
    padding: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 13px;
}

/* SLIDE */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    opacity:0;
    transition:0.4s;
}
.slide.active { opacity:1; }

/* TEXT */
.slideText {
    color: white;
    font-size: clamp(18px, 2.5vw, 32px);
    text-align: center;
    max-width: 90%;
    margin-bottom: 20px;
    line-height: 1.5;
}

/* THUMB */
.slideItem {
    height:100px;
    background: rgba(255,255,255,0.08);
    padding:8px;
    cursor:pointer;
    border-radius:10px;
    color:white;
    font-size:12px;
}
.slideItem.active {
    border:2px solid #00c6ff;
}

/* BUTTON */
button {
    margin-top: 8px;
    padding: 10px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {

    #app {
        flex-direction: column;
    }

    #previewPanel {
        height: 200px;
    }

    #bottomPanel {
        grid-template-columns: repeat(2,1fr);
    }
}

/* SMALL MOBILE */
@media (max-width: 480px) {
    #bottomPanel {
        grid-template-columns: 1fr;
    }

    .slideText {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div id="app">

<div id="leftPanel" class="panel">
    <textarea id="inputArea" placeholder="Paste lyrics..."></textarea>
    <button onclick="generateSlides()">Generate</button>
    <button onclick="openOutput()">Open Output</button>
</div>

<div id="centerPanel" class="panel">
    <div id="previewPanel"></div>
    <div id="bottomPanel"></div>
</div>

<div id="historyPanel" class="panel">
    <h3>Recent Songs</h3>
</div>

</div>

<script>
let slides=[];
let currentIndex=0;
let outputWindow=null;

function renderSlides(data){
    let preview=document.getElementById("previewPanel");
    let bottom=document.getElementById("bottomPanel");

    preview.innerHTML="";
    bottom.innerHTML="";

    data.forEach((s,i)=>{
        let slide=document.createElement("div");
        slide.className="slide";

        let text=document.createElement("div");
        text.className="slideText";
        text.innerText=s;

        slide.appendChild(text);
        preview.appendChild(slide);

        let thumb=document.createElement("div");
        thumb.className="slideItem";
        thumb.innerText=s.substring(0,60);
        thumb.onclick=()=>showSlide(i);
        bottom.appendChild(thumb);
    });

    setTimeout(()=>showSlide(0),50);
}

function generateSlides(){
    let text=document.getElementById("inputArea").value.trim();
    if(!text) return;

    slides = text.split(/\n\s*\n/).filter(s=>s);

    renderSlides(slides);
}

function showSlide(i){
    if(i<0 || i>=slides.length) return;

    currentIndex=i;

    document.querySelectorAll(".slide").forEach((s,idx)=>{
        s.classList.toggle("active",idx===i);
    });

    document.querySelectorAll(".slideItem").forEach((s,idx)=>{
        s.classList.toggle("active",idx===i);
    });

    if(outputWindow && !outputWindow.closed){
        outputWindow.postMessage({slide:slides[i]},"*");
    }
}

function openOutput(){
    outputWindow = window.open("", "_blank");

    outputWindow.document.write(`
        <body style="
            margin:0;
            background:black;
            color:white;
            font-size:clamp(30px,6vw,80px);
            display:flex;
            justify-content:center;
            align-items:flex-end;
            height:100vh;
            text-align:center;
            padding-bottom:10vh;
        ">
        <div id="slide"></div>

        <script>
        window.addEventListener("message",e=>{
            document.getElementById("slide").innerText=e.data.slide;
        });
        <\/script>
    `);

    setTimeout(()=>{
        if(slides.length>0){
            outputWindow.postMessage({slide:slides[0]},"*");
        }
    },300);
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") showSlide(currentIndex+1);
    if(e.key==="ArrowLeft") showSlide(currentIndex-1);
});
</script>

</body>
</html>
